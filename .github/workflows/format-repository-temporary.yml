name: Temporary repository formatter

on:
  push:
    branches:
      - agent/add-cloud-markdown-webapp
    paths:
      - ".github/workflows/format-repository-temporary.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/add-cloud-markdown-webapp
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project formatter
        run: pip install black==23.7.0
      - name: Format repository
        run: black .
      - name: Commit formatting changes
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u
          git commit -m "Apply repository Black formatting"
          git push origin HEAD:agent/add-cloud-markdown-webapp
