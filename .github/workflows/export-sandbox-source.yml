name: Export sandbox source

on:
  pull_request:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create source archive
        run: |
          tar --exclude=.git -czf markitdown-sandbox-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: markitdown-sandbox-source
          path: markitdown-sandbox-source.tar.gz
          retention-days: 1
